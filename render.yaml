services:
  - type: web
    name: financial-intelligence-center
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BRAPI_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONIOENCODING
        value: utf-8
